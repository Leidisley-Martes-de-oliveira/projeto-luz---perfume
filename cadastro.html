<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="login_cadastro.css">
  <title>Cadastro de Usuário</title>
</head>
<header>
    LUZ & PERFUME. 
  </header><br><br><br><br><br><br><br>
<body>
  <div class="container">
    <h2>Cadastro de Cliêntes</h2>
    <form action="validar.php" method="POST">
      <label for="nome">Nome Completo:</label>
      <input type="text" id="nome" name="nome" placeholder="Nome Completo" required>
      <label for="email">E-mail:</label>
      <input type="email" id="email" name="email" placeholder="E-mail" required>
      <label for="senha">Senha:</label>
      <input type="password" id="senha" name="senha" placeholder="Digite Sua Senha" required>
      <label for="telefone">Telefone:</label>
      <input type="text" id="telefone" name="telefone" placeholder="Telefone" required>
      <label for="cpf">CPF (000.000.000-00):</label>
      <input type="text" id="cpf" name="cpf" placeholder="CPF (000.000.000-00)" required>
      <label for="cep">CEP:</label>
      <input type="text" id="cep" name="cep" placeholder="CEP" required onblur="buscarCep()">
      <label for="endereco">Endereço Completo:</label>
      <input type="text" id="endereco" name="endereco" placeholder="Endereço Completo" required readonly>
      <button type="submit">Cadastrar</button>
    </form>
	<br><br>
	<a href="index.html"> << Voltar</a>

  </div>
  <script>
    function buscarCep() {
      var cep = document.getElementById('cep').value.replace(/\D/g, '');
      if (cep.length !== 8) {
        alert("CEP inválido!");
        return;
      }
      fetch(`https://viacep.com.br/ws/${cep}/json/`)
        .then(response => response.json())
        .then(data => {
          if (data.erro) {
            alert("CEP não encontrado!");
          } else {
            document.getElementById('endereco').value = `${data.logradouro}, ${data.bairro}, ${data.localidade} - ${data.uf}`;
          }
        })
        .catch(error => console.error('Erro ao buscar CEP:', error));
    }
  </script>
